<!DOCTYPE html>
<html>
<head>
<title>Election Command Center</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;padding:10px;background:linear-gradient(135deg,#000,#FF9933,#FFD700);color:#fff}
.top{display:flex;gap:8px;flex-wrap:wrap}
.card{background:rgba(255,255,255,.12);padding:8px;border-radius:8px}
.wrap{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px;max-height:60vh;overflow:auto}
.cbox{background:rgba(255,255,255,.1);padding:8px;border-radius:8px}
.row{display:flex;gap:5px;margin:3px 0}
input{height:26px}
.name{width:90px}
.num{width:55px}
button{margin:5px;padding:6px 10px}
</style>
</head>

<body>

<h2>🗳️ Election Command Center</h2>

<div class="top">
<div class="card" id="gt">Total: 0</div>
<div class="card" id="lm">Male: 0</div>
<div class="card" id="lf">Female: 0</div>
<div class="card" id="lh">Hour: --</div>
</div>

<div class="wrap" id="wrap"></div>

<button onclick="saveData()">⚡ Save Hour</button>
<button onclick="resetAll()"> ♻️Reset</button>
<button onclick="exportExcel()">📥 Copy to Excel</button>

<textarea id="excelData" style="width:100%;height:200px;margin-top:10px;"></textarea>

<h3>📈 Hourly Trend</h3>
<canvas id="chart"></canvas>

<h3>📊 Constituency Gender Chart</h3>
<canvas id="chart2"></canvas>

<script>

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyD6Dy9SIazVhEJdM79aYLFqQWnj8fba2XQ",
  authDomain: "erection-26.firebaseapp.com",
  databaseURL: "https://erection-26-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "erection-26",
  storageBucket: "erection-26.firebasestorage.app",
  messagingSenderId: "567134005797",
  appId: "1:567134005797:web:696ab8872ad550df17edcc",
  measurementId: "G-LMJ61KBQYG"
};
  
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const wrap = document.getElementById('wrap');

// BUILD UI
for(let i=1;i<=60;i++){
  wrap.innerHTML += `
  <div class="cbox">
    <b>Constituency ${i}</b>
    <div id="cand_${i}"></div>
    <button onclick="addStation(${i})">+ Polling Station</button>
    <div id="lead_${i}">Total: 0</div>
  </div>`;
  addStation(i);
}

// ADD STATION
function addStation(i){
  const div = document.getElementById('cand_'+i);

  div.innerHTML += `
  <div class="row">
    <input class="name" placeholder="PS Name">
    M<input class="num" type="number">
    F<input class="num" type="number">
  </div>`;
}

// ✅ CLEAN HOUR SLOT
function hour(){
  const h = new Date().getHours();

  if(h < 7) return "Before07";
  if(h >= 17) return "17-18";

  return `${String(h).padStart(2,'0')}-${String(h+1).padStart(2,'0')}`;
}

let chart, chart2;

// SAVE DATA
async function saveData(){
  try{
    const hr = hour();

    let data={}, gM=0, gF=0;

    for(let i=1;i<=60;i++){
      const div=document.getElementById('cand_'+i);

      let stations=[];
      let cMale=0, cFemale=0;

      div.querySelectorAll('.row').forEach(r=>{
        let ps=r.children[0].value.trim();
        let m=+r.children[1].value||0;
        let f=+r.children[2].value||0;

        if(ps){
          stations.push({name:ps, male:m, female:f});
        }

        cMale+=m;
        cFemale+=f;
      });

      data['C'+i]={
        stations,
        totalMale:cMale,
        totalFemale:cFemale,
        total:cMale+cFemale
      };

      gM+=cMale;
      gF+=cFemale;

      document.getElementById('lead_'+i).innerText =
        `Total: ${cMale+cFemale} (M:${cMale} F:${cFemale})`;
    }

    data.totalMale=gM;
    data.totalFemale=gF;
    data.grandTotal=gM+gF;

    await db.collection('votes').doc(hr).set(data,{merge:true});

    document.getElementById('gt').innerText='Total: '+data.grandTotal;
    document.getElementById('lm').innerText='Male: '+gM;
    document.getElementById('lf').innerText='Female: '+gF;
    document.getElementById('lh').innerText='Hour: '+hr;

    alert("Saved ✅");

  }catch(e){
    alert("Error: "+e.message);
  }
}

// 🔥 RESET DATABASE + UI
async function resetAll(){
  if(!confirm("⚠️ This will DELETE ALL DATA. Continue?")) return;

  try{
    const snap = await db.collection('votes').get();

    const batch = db.batch();
    snap.forEach(doc=>{
      batch.delete(doc.ref);
    });

    await batch.commit();

    // CLEAR UI
    document.querySelectorAll('input').forEach(i=>i.value='');

    for(let i=1;i<=60;i++){
      document.getElementById('lead_'+i).innerText="Total: 0";
    }

    document.getElementById('gt').innerText="Total: 0";
    document.getElementById('lm').innerText="Male: 0";
    document.getElementById('lf').innerText="Female: 0";
    document.getElementById('lh').innerText="Hour: --";

    document.getElementById('excelData').value="";

    if(chart) chart.destroy();
    if(chart2) chart2.destroy();

    alert("Database Reset Successful ✅");

  }catch(e){
    alert("Reset failed: "+e.message);
  }
}

// EXPORT EXCEL
async function exportExcel(){
  const snapshot = await db.collection('votes').get();

  let csv = "Hour,Constituency,Polling Station,Male,Female,Total\n";

  snapshot.forEach(doc=>{
    const hr = doc.id;
    const d = doc.data();

    for(let i=1;i<=60;i++){
      const c = d['C'+i];

      if(c && c.stations){
        c.stations.forEach(ps=>{
          let total = (ps.male||0)+(ps.female||0);
          csv += `${hr},C${i},${ps.name},${ps.male||0},${ps.female||0},${total}\n`;
        });
      }
    }
  });

  document.getElementById('excelData').value = csv;
}

// LOAD CHARTS
function loadCharts(){
  db.collection('votes').onSnapshot(snap=>{

    let docs=[];
    snap.forEach(doc=>docs.push({id:doc.id,data:doc.data()}));

    docs.sort((a,b)=>a.id.localeCompare(b.id));

    let labels=[], totals=[];
    let runningTotal=0;

    let consMap={};

    docs.forEach(d=>{
      labels.push(d.id);

      runningTotal += (d.data.grandTotal || 0);
      totals.push(runningTotal);

      for(let i=1;i<=60;i++){
        let key='C'+i;
        let c=d.data[key];

        if(c){
          if(!consMap[key]){
            consMap[key]={male:0,female:0};
          }

          consMap[key].male += (c.totalMale||0);
          consMap[key].female += (c.totalFemale||0);
        }
      }
    });

    let consLabels=[], maleData=[], femaleData=[];

    Object.keys(consMap).forEach(k=>{
      consLabels.push(k);
      maleData.push(consMap[k].male);
      femaleData.push(consMap[k].female);
    });

    if(chart) chart.destroy();
    if(chart2) chart2.destroy();

    // 📈 HOURLY TREND
    chart = new Chart(document.getElementById('chart'),{
      type:'line',
      data:{
        labels,
        datasets:[{
          label:'Total Votes',
          data:totals,
          tension:0.3
        }]
      }
    });

    // 📊 GENDER CHART (ALL DATA)
    chart2 = new Chart(document.getElementById('chart2'),{
      type:'bar',
      data:{
        labels: consLabels,
        datasets:[
          { label:'Male', data: maleData },
          { label:'Female', data: femaleData }
        ]
      }
    });

  });
}

loadCharts();
</script>
  </body>
</html>
