<!DOCTYPE html>
<html>
<head>
<title>Election Command Center</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;padding:10px;background:linear-gradient(135deg,#000,#FF9933,#FFD700);color:#fff}
.top{display:flex;gap:8px;flex-wrap:wrap}
.card{background:rgba(255,255,255,.12);padding:8px;border-radius:8px}
.wrap{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px;max-height:60vh;overflow:auto}
.cbox{background:rgba(255,255,255,.1);padding:8px;border-radius:8px}
.row{display:flex;gap:5px;margin:3px 0}
input{height:26px}
.name{width:90px}
.num{width:55px}
button{margin:5px;padding:6px 10px}
</style>
</head>

<body>

<h2>🗳️ Election Command Center</h2>

<div class="top">
<div class="card" id="gt">Total: 0</div>
<div class="card" id="lm">Male: 0</div>
<div class="card" id="lf">Female: 0</div>
<div class="card" id="lh">Hour: --</div>
</div>

<div class="wrap" id="wrap"></div>

<button onclick="saveData()">⚡ Save Hour</button>
<button onclick="resetAll()">Reset</button>
<button onclick="exportExcel()">📥 Export Excel</button>
<textarea id="excelData" style="width:100%;height:200px;margin-top:10px;"></textarea>

<h3>🏆 Top Candidates</h3>
<div id="leaders"></div>

<h3>📊 Hourly Trend</h3>
<canvas id="chart"></canvas>

<h3>📊 Constituency Gender Chart</h3>
<canvas id="chart2"></canvas>

<script>

const firebaseConfig = {  
  apiKey: "AIzaSyD6Dy9SIazVhEJdM79aYLFqQWnj8fba2XQ",  
  authDomain: "erection-26.firebaseapp.com",  
  databaseURL: "https://erection-26-default-rtdb.asia-southeast1.firebasedatabase.app",  
  projectId: "erection-26",  
  storageBucket: "erection-26.firebasestorage.app",  
  messagingSenderId: "567134005797",  
  appId: "1:567134005797:web:696ab8872ad550df17edcc",  
  measurementId: "G-LMJ61KBQYG"  }; 
 firebase.initializeApp(firebaseConfig);
 const db=firebase.firestore();

// ✅ BUILD UI
for(let i=1;i<=60;i++){
  wrap.innerHTML += `
  <div class="cbox">
    <b>Constituency ${i}</b>
    <div id="cand_${i}"></div>
    <button onclick="addStation(${i})">+ Polling Station</button>
    <div class="leader" id="lead_${i}">Total: 0</div>
  </div>`;

  addStation(i);
}

// ADD POLLING STATION
function addStation(i){
  const div = document.getElementById('cand_'+i);
  const idx = div.children.length;

  div.innerHTML += `
  <div class="row">
    <input class="name" placeholder="PS Name">
    M<input class="num" type="number">
    F<input class="num" type="number">
  </div>`;
}

// TIME SLOT
function hour(){
  const h=new Date().getHours();
  if(h<7)return"Before 07";
  if(h>=17)return"05-05:30";
  return`${String(h).padStart(2,'0')}-${String(h+1).padStart(2,'0')}`;
}

let chart, chart2;

// ✅ SAVE DATA
async function exportExcel(){
  try{
    const snapshot = await db.collection('votes').get();

    if(snapshot.empty){
      alert("No data found");
      return;
    }

    let csv = "Hour,Constituency,Male,Female,Total\n";

    snapshot.forEach(doc=>{
      const hour = doc.id;
      const d = doc.data();

      for(let i=1;i<=60;i++){
        const c = d['C'+i];

        if(c){
          csv += `${hour},C${i},${c.totalMale||0},${c.totalFemale||0},${c.total||0}\n`;
        }
      }
    });

    // ✅ SHOW DATA IN TEXTBOX (100% WORKING)
    document.getElementById('excelData').value = csv;

    alert("Data ready → Copy and paste into Excel");

  }catch(e){
    alert("Error: "+e.message);
  }
}

// ✅ RESET (UI ONLY)
function resetAll(){
  document.querySelectorAll('input').forEach(i=>i.value='');

  for(let i=1;i<=60;i++){
    document.getElementById('lead_'+i).innerText="Total: 0";
  }

  if(chart) chart.destroy();
  if(chart2) chart2.destroy();
}

// ✅ LOAD CHARTS (FIXED)
function loadCharts(){
  db.collection('votes').onSnapshot(snap=>{

    let docs=[];
    snap.forEach(doc=>docs.push({id:doc.id,data:doc.data()}));

    docs.sort((a,b)=>a.id.localeCompare(b.id));

    let labels=[], totals=[];
    let runningTotal=0;

    let consLabels=[], maleData=[], femaleData=[];

    docs.forEach(d=>{
      labels.push(d.id);

      runningTotal += (d.data.grandTotal || 0);
      totals.push(runningTotal);

      // ✅ Only take LAST snapshot for constituency chart
      for(let k in d.data){
        if(k.startsWith('C') && d.data[k]?.totalMale !== undefined){

          consLabels.push(k);
          maleData.push(d.data[k].totalMale);
          femaleData.push(d.data[k].totalFemale);
        }
      }
    });

    // REMOVE DUPLICATES (important fix)
    consLabels = [...new Set(consLabels)];

    // RESET CHARTS
    if(chart) chart.destroy();
    if(chart2) chart2.destroy();

    // 📈 HOURLY TREND
    chart = new Chart(document.getElementById('chart'),{
      type:'line',
      data:{
        labels,
        datasets:[{
          label:'Total Votes',
          data:totals
        }]
      }
    });

    // 📊 MALE vs FEMALE PER CONSTITUENCY
    chart2 = new Chart(document.getElementById('chart2'),{
      type:'bar',
      data:{
        labels: consLabels,
        datasets:[
          { label:'Male', data: maleData },
          { label:'Female', data: femaleData }
        ]
      }
    });

  });
}
loadCharts();
</script><div style="position:fixed;bottom:8px;right:10px;opacity:.5">Page open,  locked on 13/04/2026 dibyendu_deb@outlook.com</div></body>
</script>
</body>
</html>
