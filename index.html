<!DOCTYPE html>
<html>
<head>
<title>Election Command Center</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;padding:10px;background:linear-gradient(135deg,#000,#FF9933,#FFD700);color:#fff}
.top{display:flex;gap:8px;flex-wrap:wrap}
.card{background:rgba(255,255,255,.12);padding:8px;border-radius:8px}
.wrap{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px;max-height:60vh;overflow:auto}
.cbox{background:rgba(255,255,255,.1);padding:8px;border-radius:8px}
.row{display:flex;gap:5px;margin:3px 0}
input{height:26px}
.name{width:90px}
.num{width:55px}
button{margin:5px;padding:6px 10px}
</style>
</head>

<body>

<h2>🗳️ Election Command Center</h2>

<div class="top">
<div class="card" id="gt">Total: 0</div>
<div class="card" id="lm">Male: 0</div>
<div class="card" id="lf">Female: 0</div>
<div class="card" id="lh">Hour: --</div>
</div>

<div class="wrap" id="wrap"></div>

<button onclick="saveData()">⚡ Save Hour</button>
<button onclick="resetAll()">Reset</button>
<button onclick="exportExcel()">📥 Export Excel</button>
<textarea id="excelData" style="width:100%;height:200px;margin-top:10px;"></textarea>

<h3>🏆 Top Candidates</h3>
<div id="leaders"></div>

<h3>📊 Hourly Trend</h3>
<canvas id="chart"></canvas>

<h3>📊 Constituency Gender Chart</h3>
<canvas id="chart2"></canvas>

<script>

  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyD6Dy9SIazVhEJdM79aYLFqQWnj8fba2XQ",
  authDomain: "erection-26.firebaseapp.com",
  databaseURL: "https://erection-26-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "erection-26",
  storageBucket: "erection-26.firebasestorage.app",
  messagingSenderId: "567134005797",
  appId: "1:567134005797:web:696ab8872ad550df17edcc",
  measurementId: "G-LMJ61KBQYG"
};
  
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const wrap = document.getElementById('wrap');

// ✅ BUILD UI WITH UNIQUE IDs
for(let i=1;i<=60;i++){
  wrap.innerHTML += `
  <div class="cbox">
    <b>Constituency ${i}</b>
    <div id="cand_${i}"></div>
    <button onclick="addStation(${i})">+ Polling Station</button>
    <div id="lead_${i}">Total: 0</div>
  </div>`;

  addStation(i);
}

// ✅ ADD STATION WITH IDS
function addStation(i){
  const div = document.getElementById('cand_'+i);
  const idx = div.children.length;

  div.innerHTML += `
  <div class="row">
    <input id="ps_${i}_${idx}" placeholder="PS Name">
    M<input id="m_${i}_${idx}" type="number">
    F<input id="f_${i}_${idx}" type="number">
  </div>`;
}

// ✅ TIME SLOT
function hour(){
  const h=new Date().getHours();
  if(h<7)return"Before 07";
  if(h>=17)return"05-05:30";
  return`${String(h).padStart(2,'0')}-${String(h+1).padStart(2,'0')}`;
}

let chart, chart2;

// ✅ SAVE DATA (FIXED)
async function saveData(){
  try{
    const hr = hour();

    let data={}, gM=0, gF=0;

    for(let i=1;i<=60;i++){
      const div=document.getElementById('cand_'+i);

      let cMale=0, cFemale=0;

      for(let j=0;j<div.children.length;j++){
        let ps=document.getElementById(`ps_${i}_${j}`)?.value;
        let m=+document.getElementById(`m_${i}_${j}`)?.value||0;
        let f=+document.getElementById(`f_${i}_${j}`)?.value||0;

        if(ps){
          cMale+=m;
          cFemale+=f;
        }
      }

      data['C'+i]={
        totalMale:cMale,
        totalFemale:cFemale,
        total:cMale+cFemale
      };

      gM+=cMale;
      gF+=cFemale;

      document.getElementById('lead_'+i).innerText =
        `Total: ${cMale+cFemale} (M:${cMale} F:${cFemale})`;
    }

    data.totalMale=gM;
    data.totalFemale=gF;
    data.grandTotal=gM+gF;

    await db.collection('votes').doc(hr).set(data);

    document.getElementById('gt').innerText='Total: '+data.grandTotal;
    document.getElementById('lm').innerText='Male: '+gM;
    document.getElementById('lf').innerText='Female: '+gF;
    document.getElementById('lh').innerText='Hour: '+hr;

    alert("Saved ✅");

  }catch(e){
    alert("Error: "+e.message);
  }
}

// ✅ RESET (FULL FIX)
function resetAll(){
  document.querySelectorAll('input').forEach(i=>i.value='');

  for(let i=1;i<=60;i++){
    document.getElementById('lead_'+i).innerText="Total: 0";
  }

  document.getElementById('excelData').value = "";

  if(chart) chart.destroy();
  if(chart2) chart2.destroy();
}

// ✅ EXPORT EXCEL (WORKING 100%)
async function exportExcel(){
  try{
    const snap = await db.collection('votes').get();

    if(snap.empty){
      alert("No data");
      return;
    }

    let csv="Hour,Constituency,Male,Female,Total\n";

    snap.forEach(doc=>{
      const d=doc.data();

      for(let i=1;i<=60;i++){
        const c=d['C'+i];
        if(c){
          csv+=`${doc.id},C${i},${c.totalMale||0},${c.totalFemale||0},${c.total||0}\n`;
        }
      }
    });

    // ✅ DOWNLOAD FILE
    const blob = new Blob([csv], {type:"text/csv"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "Election_Data.csv";
    a.click();

    URL.revokeObjectURL(url);

  }catch(e){
    alert("Error: "+e.message);
  }
}

// ✅ LOAD CHARTS (FULL FIX)
function loadCharts(){
  db.collection('votes').onSnapshot(snap=>{

    let docs=[];
    snap.forEach(doc=>docs.push({id:doc.id,data:doc.data()}));

    docs.sort((a,b)=>a.id.localeCompare(b.id));

    let labels=[], totals=[];
    let runningTotal=0;

    let latest = docs[docs.length-1]?.data || {};

    let consLabels=[], maleData=[], femaleData=[];

    docs.forEach(d=>{
      labels.push(d.id);
      runningTotal += (d.data.grandTotal || 0);
      totals.push(runningTotal);
    });

    // ✅ ONLY LATEST DATA FOR CONSTITUENCY CHART
    for(let i=1;i<=60;i++){
      const c = latest['C'+i];
      if(c){
        consLabels.push("C"+i);
        maleData.push(c.totalMale||0);
        femaleData.push(c.totalFemale||0);
      }
    }

    if(chart) chart.destroy();
    if(chart2) chart2.destroy();

    // 📈 TREND
    chart = new Chart(document.getElementById('chart'),{
      type:'line',
      data:{
        labels,
        datasets:[{label:'Total Votes',data:totals}]
      }
    });

    // 📊 GENDER CHART
    chart2 = new Chart(document.getElementById('chart2'),{
      type:'bar',
      data:{
        labels:consLabels,
        datasets:[
          {label:'Male',data:maleData},
          {label:'Female',data:femaleData}
        ]
      }
    });

  });
}

loadCharts();
</script><div style="position:fixed;bottom:8px;right:10px;opacity:.5">Page open,  locked on 13/04/2026 dibyendu_deb@outlook.com</div></body>
</script>
</body>
</html>
